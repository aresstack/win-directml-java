name: DirectML Workbench

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build workbench fat jar
        run: ./gradlew :directml-workbench:shadowJar

      - name: Verify release inputs
        run: |
          test -f directml-workbench/build/libs/directml-workbench-all.jar
          test -f directml-workbench/packaging/launcher.ps1
          ls -l directml-workbench/build/libs/directml-workbench-all.jar
          ls -l directml-workbench/packaging/launcher.ps1

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: directml-workbench-all
          path: directml-workbench/build/libs/directml-workbench-all.jar

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-ps1
          path: directml-workbench/packaging/launcher.ps1

      - name: Delete existing release (if any)
        run: gh release delete directml-workbench-latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag (if any)
        run: git push --delete origin directml-workbench-latest || true

      - name: Create rolling release with jar
        run: |
          gh release create directml-workbench-latest \
            directml-workbench/build/libs/directml-workbench-all.jar \
            --title "DirectML Workbench (latest)" \
            --notes "Rolling demo release of the DirectML Workbench standalone fat jar. Requires Java 21 or newer. Download directml-workbench-all.jar and launcher.ps1 into the same directory, then run: powershell -ExecutionPolicy Bypass -File .\\launcher.ps1" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload launcher release asset
        run: gh release upload directml-workbench-latest directml-workbench/packaging/launcher.ps1 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release assets
        run: gh release view directml-workbench-latest --json assets --jq '.assets[].name'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
