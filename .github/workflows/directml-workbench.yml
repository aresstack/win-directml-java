name: DirectML Workbench

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build workbench fat jar
        run: ./gradlew :directml-workbench:shadowJar

      - name: Prepare Windows package
        run: |
          mkdir -p build/workbench-release
          cp directml-workbench/build/libs/directml-workbench-all.jar build/workbench-release/
          cp directml-workbench/packaging/directml-workbench.ps1 build/workbench-release/
          cp directml-workbench/packaging/README-WINDOWS.txt build/workbench-release/
          cd build/workbench-release
          zip -9 ../directml-workbench-windows.zip directml-workbench-all.jar directml-workbench.ps1 README-WINDOWS.txt

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: directml-workbench-all
          path: directml-workbench/build/libs/directml-workbench-all.jar

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: directml-workbench-windows
          path: build/directml-workbench-windows.zip

      - name: Delete existing release (if any)
        run: gh release delete directml-workbench-latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag (if any)
        run: git push --delete origin directml-workbench-latest || true

      - name: Create rolling release
        run: |
          gh release create directml-workbench-latest \
            directml-workbench/build/libs/directml-workbench-all.jar \
            build/directml-workbench-windows.zip \
            --title "DirectML Workbench (latest)" \
            --notes "Rolling demo release of the DirectML Workbench. Windows users should download directml-workbench-windows.zip and start with directml-workbench.ps1 so Java 21 is selected explicitly." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
