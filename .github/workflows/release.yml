name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    # The DirectML runtime tests would require an Iris/Arc/Adreno/AMD GPU
    # that supports DirectML – not available on GitHub-hosted runners. The
    # publish job therefore skips tests and trusts the green CI on the
    # release branch instead. Use the local
    # `./gradlew :directml-encoder:test :directml-windows-bindings:test`
    # before tagging.
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build + sign + publish to Sonatype Central Portal
        env:
          ORG_GRADLE_PROJECT_centralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew \
            -Pversion=${{ steps.ver.outputs.version }} \
            --no-daemon \
            -x test \
            publishAllPublicationsToCentralPortal

      - name: Build sidecar distribution zip
        run: ./gradlew --no-daemon -Pversion=${{ steps.ver.outputs.version }} :directml-sidecar:distZip

      - name: Build workbench distribution zip
        run: ./gradlew --no-daemon -Pversion=${{ steps.ver.outputs.version }} :directml-sidecar-workbench:distZip

      - name: Attach sidecar and workbench zips to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            directml-sidecar/build/distributions/*.zip
            directml-sidecar-workbench/build/distributions/*.zip
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
