plugins {
    id 'java'
    id 'com.gradleup.nmcp' version '0.1.5' apply false
    id 'com.gradleup.nmcp.aggregation' version '0.1.5' apply false
}

allprojects {
    group = 'com.aresstack'
    version = project.findProperty('version') == 'unspecified'
            ? '0.1.0-SNAPSHOT' : project.version
    repositories {
        mavenLocal()
        mavenCentral()
    }
}

// ── Publishable modules ─────────────────────────────────────────────
// Maven Central now publishes only the Java 21 core Windows inference API.
// Sidecar / Java-8 bridge / workbench modules remain in the repository as
// frozen beta/legacy adapters, but are no longer part of new releases. A
// future ACP sidecar / manager project should consume directml-runtime
// directly instead of depending on this repository's legacy JSON-RPC sidecar.
ext.publishableModules = [
        'directml-config',
        'directml-windows-bindings',
        'directml-encoder',
        'directml-runtime',
        // Legacy beta modules kept in source but intentionally not published:
        // 'directml-inference',
        // 'directml-sidecar-protocol-java8',
        // 'directml-sidecar-client-java8',
        // 'directml-sidecar',
        // 'directml-sidecar-workbench',
]

subprojects {
    apply plugin: 'java-library'

    // Java-8-compatible modules (consumed by Java-8 host applications)
    // opt out of the toolchain default + preview flags below by setting
    // ext.java8Module = true in their own build.gradle.
    ext.java8Module = false
}

subprojects { sub ->
    afterEvaluate {
        if (sub.ext.java8Module) {
            // Configured per-module (see directml-sidecar-client-java8 and
            // directml-sidecar-workbench build.gradle files).
            return
        }

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(21)
            }
        }

        compileJava.options.encoding = 'UTF-8'
        compileTestJava.options.encoding = 'UTF-8'
        compileJava.options.compilerArgs += ['--enable-preview', '--add-modules=jdk.incubator.vector']
        compileTestJava.options.compilerArgs += ['--enable-preview', '--add-modules=jdk.incubator.vector']

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
            jvmArgs '--enable-preview', '--enable-native-access=ALL-UNNAMED', '--add-modules=jdk.incubator.vector'
            // Real-model reference tests load BERT-class safetensors
            // checkpoints (~90 MB for the reranker, ~130 MB for the
            // e5-base-v2 weights) and run CPU + DirectML side by side –
            // 512 MB (Gradle default) is not enough headroom.
            maxHeapSize = '2g'
            // Forward selected system properties from the Gradle invocation
            // into the test JVM (e.g. -Dwindirectml.debug=true,
            // -Dqwen.model.dir=..., -Dqwen.enable.experimental.runtime=true).
            System.getProperties().each { k, v ->
                String key = k.toString()
                if (key.startsWith('windirectml.') || key.startsWith('qwen.')) {
                    systemProperty(k.toString(), v.toString())
                }
            }
        }

        tasks.withType(JavaExec).configureEach {
            jvmArgs '--enable-preview', '--enable-native-access=ALL-UNNAMED', '--add-modules=jdk.incubator.vector'
            // Forward -Dwindirectml.* system properties (e.g. windirectml.debug,
            // windirectml.directml.dll) from the Gradle invocation into the JVM.
            System.getProperties().each { k, v ->
                if (k.toString().startsWith('windirectml.')) {
                    systemProperty(k.toString(), v.toString())
                }
            }
        }

        dependencies {
            implementation 'org.slf4j:slf4j-api:2.0.13'
            // JUnit BOM aligns all org.junit.* artifact versions, so junit-platform-launcher resolves to a
            // concrete version (1.10.x) without a hard-coded pin and CLI test runs work offline.
            testImplementation platform('org.junit:junit-bom:5.10.2')
            testImplementation 'org.junit.jupiter:junit-jupiter'
            testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
            testRuntimeOnly 'ch.qos.logback:logback-classic:1.5.6'
        }
    }
}
// --------------------------------------------------------------------
// Maven Central publishing (Sonatype Central Portal via nmcp)
// --------------------------------------------------------------------
//
// Triggers:
//   ./gradlew publishToMavenLocal                       # local install for testing
//   ./gradlew publishAllPublicationsToCentralPortal     # upload all publishable
//                                                         modules to Central
//                                                         Portal (CI release job)
//
// Required environment / Gradle properties for a real release:
//   ORG_GRADLE_PROJECT_centralUsername       Sonatype Central Portal user-token
//   ORG_GRADLE_PROJECT_centralPassword       Sonatype Central Portal password-token
//   ORG_GRADLE_PROJECT_signingInMemoryKey    ASCII-armored GPG private key
//   ORG_GRADLE_PROJECT_signingInMemoryKeyPassword   GPG passphrase
//
// Signing is skipped automatically for SNAPSHOT builds and when the
// signing key is absent (so `publishToMavenLocal` works without any
// secrets).
apply plugin: 'com.gradleup.nmcp.aggregation'
apply plugin: 'maven-publish'
ext.pomMetadata = { pom, prj ->
    pom.name = provider { prj.findProperty('POM_NAME') ?: prj.name }
    pom.description = provider {
        prj.findProperty('POM_DESCRIPTION')
                ?: 'Pure-Java DirectML runtime, encoders and sidecar for Windows.'
    }
    pom.url = 'https://github.com/aresstack/win-directml-java'
    pom.licenses {
        license {
            name = 'MIT'
            url = 'https://opensource.org/licenses/MIT'
            distribution = 'repo'
        }
    }
    pom.developers {
        developer {
            id = 'miguel0888'
            name = 'miguel0888'
        }
    }
    pom.scm {
        connection = 'scm:git:git://github.com/aresstack/win-directml-java.git'
        developerConnection = 'scm:git:ssh://git@github.com/aresstack/win-directml-java.git'
        url = 'https://github.com/aresstack/win-directml-java'
        tag = 'HEAD'
    }
    pom.issueManagement {
        system = 'GitHub'
        url = 'https://github.com/aresstack/win-directml-java/issues'
    }
}
configure(subprojects.findAll { it.name in publishableModules }) {
    apply plugin: 'maven-publish'
    apply plugin: 'signing'
    java {
        withSourcesJar()
        withJavadocJar()
    }
    // Bundle LICENSE + NOTICE into every published jar so downstream
    // consumers always see the attribution required by section 4 of
    // the MIT License.
    tasks.withType(Jar).configureEach {
        from(rootProject.file('LICENSE')) { into 'META-INF' }
        from(rootProject.file('NOTICE')) { into 'META-INF' }
    }
    // Real-model BERT weights and large internal Javadoc make
    // `doclint` too noisy to enforce – mirror the win-proxy-java setup
    // and run javadoc with lenient settings.
    tasks.withType(Javadoc).configureEach {
        options.encoding = 'UTF-8'
        if (options instanceof org.gradle.external.javadoc.StandardJavadocDocletOptions) {
            options.addStringOption('Xdoclint:none', '-quiet')
            // Java-21 modules use FFM preview APIs (Arena, MemorySegment).
            // Javadoc must be told explicitly – the compiler flag set in
            // the per-module config does not propagate to the javadoc tool.
            if (project.findProperty('java8Module') != true) {
                options.addBooleanOption('-enable-preview', true)
                options.addStringOption('-source', '21')
            }
        }
    }
    afterEvaluate {
        publishing {
            publications {
                maven(MavenPublication) {
                    from components.java
                    artifactId = project.name
                    pom { p ->
                        rootProject.ext.pomMetadata(p, project)
                    }
                }
            }
        }
        signing {
            def signingKey = providers.gradleProperty('signingInMemoryKey').orNull
            def signingPwd = providers.gradleProperty('signingInMemoryKeyPassword').orNull
            required = {
                gradle.taskGraph.allTasks.any { task ->
                    task.name == 'publishAllPublicationsToCentralPortal'
                            || task.path.endsWith(':publishAllPublicationsToCentralPortal')
                } && !version.toString().endsWith('-SNAPSHOT')
            }
            if (signingKey != null) {
                useInMemoryPgpKeys(signingKey, signingPwd)
            }
            sign publishing.publications.maven
        }
    }
}
// Aggregate-publish all publishable modules to the Sonatype Central
// Portal in one upload. The nmcp.aggregation plugin registers
// `publishAllPublicationsToCentralPortal` via
// `publishAllProjectsProbablyBreakingProjectIsolation`; credentials come
// from ORG_GRADLE_PROJECT_centralUsername / centralPassword.
nmcpAggregation {
    publishAllProjectsProbablyBreakingProjectIsolation {
        username = providers.gradleProperty('centralUsername')
        password = providers.gradleProperty('centralPassword')
        // Auto-publish after validation passes. Set to 'USER_MANAGED'
        // for a stop-the-line manual sanity check in the Central Portal
        // web UI before going live.
        publishingType = 'AUTOMATIC'
    }
}
